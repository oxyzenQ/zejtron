[package]
name = "zejtron"
version = "0.4.0"
edition = "2024"
rust-version = "1.85"
license = "MIT"
repository = "https://github.com/oxyzenQ/zejtron"
authors = ["rezky_nightky"]
description = "A small Linux terminal toolkit for tracing paths, ports, env, recent files, and services."

[dependencies]
clap = { version = "4.5.40", features = ["derive"] }

[dev-dependencies]
tempfile = "3.20.0"

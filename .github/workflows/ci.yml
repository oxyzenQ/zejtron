---
name: zejtron - CI

"on":
  push:
    branches:
      - main
    paths:
      - '**/*.rs'
      - '**/*.toml'
      - '**/*.sh'
      - 'Cargo.lock'
      - 'build.rs'
      - 'rust-toolchain*'
      - '.github/workflows/**'
  pull_request:
    branches:
      - main
    paths:
      - '**/*.rs'
      - '**/*.toml'
      - '**/*.sh'
      - 'Cargo.lock'
      - 'build.rs'
      - 'rust-toolchain*'
      - '.github/workflows/**'

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          persist-credentials: false

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2

      - name: Install codespell
        run: python3 -m pip install --user codespell

      - name: Run checks
        run: ./scripts/build.sh

  workflow_quality:
    name: Workflow lint + codespell
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install workflow lint tools
        run: |
          python3 -m pip install --user yamllint codespell
          go install github.com/rhysd/actionlint/cmd/actionlint@latest
          echo "${HOME}/go/bin" >> "${GITHUB_PATH}"

      - name: Run actionlint
        run: actionlint .github/workflows/*.yml

      - name: Run yamllint
        run: yamllint .github/workflows

      - name: Run codespell
        run: |
          if [ -f .codespellrc ]; then
            codespell --config .codespellrc .
          else
            codespell --skip './.git,./target,./assets,./dist,./node_modules' .
          fi

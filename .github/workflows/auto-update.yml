name: zejtron - Weekly Maintenance

on:
  schedule:
    - cron: "0 16 * * 6"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: weekly-maintenance-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate:
    name: Validate dependency refresh
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      changed: ${{ steps.changes.outputs.changed }}

    steps:
      - name: Checkout default branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}
          persist-credentials: false
          fetch-depth: 1

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2

      - name: Install codespell
        run: python3 -m pip install --user codespell

      - name: Refresh Cargo dependencies
        run: cargo update

      - name: Enforce dependency-only diff
        id: changes
        shell: bash
        run: |
          set -Eeuo pipefail
          if git diff --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "Dependencies are already up to date"
            exit 0
          fi

          git diff --name-only | tee /tmp/changed-files.txt
          if grep -vE '^Cargo\.lock$' /tmp/changed-files.txt; then
            echo "::error::Auto-update may only modify Cargo.lock"
            exit 1
          fi

          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Run checks
        if: steps.changes.outputs.changed == 'true'
        run: ./check.sh

      - name: Upload validated Cargo.lock
        if: steps.changes.outputs.changed == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: validated-cargo-lock
          path: Cargo.lock
          if-no-files-found: error

  commit:
    name: Commit dependency refresh
    runs-on: ubuntu-latest
    needs: validate
    if: needs.validate.outputs.changed == 'true'
    permissions:
      contents: write

    env:
      DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}

    steps:
      - name: Checkout default branch
        uses: actions/checkout@v4
        with:
          ref: ${{ env.DEFAULT_BRANCH }}
          fetch-depth: 0

      - name: Download validated Cargo.lock
        uses: actions/download-artifact@v4
        with:
          name: validated-cargo-lock
          path: .auto-update

      - name: Commit dependency refresh
        shell: bash
        run: |
          set -Eeuo pipefail
          cp .auto-update/Cargo.lock Cargo.lock

          if git diff --quiet; then
            echo "Validated lockfile is already current"
            exit 0
          fi

          git diff --name-only | tee /tmp/changed-files.txt
          if grep -vE '^Cargo\.lock$' /tmp/changed-files.txt; then
            echo "::error::Commit job may only modify Cargo.lock"
            exit 1
          fi

          git config user.name "oxyzenQ"
          git config user.email "130107241+oxyzenQ@users.noreply.github.com"
          git add Cargo.lock
          git commit -m "chore: weekly dependency refresh"
          git push origin "HEAD:${DEFAULT_BRANCH}"

name: zejtron - Weekly Maintenance

on:
  schedule:
    - cron: "0 16 * * 6"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: weekly-maintenance-${{ github.ref }}
  cancel-in-progress: false

jobs:
  refresh:
    name: Refresh dependencies
    runs-on: ubuntu-latest

    env:
      DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}

    steps:
      - name: Checkout default branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}
          fetch-depth: 0

      - name: Configure git author
        run: |
          git config user.name "oxyzenQ"
          git config user.email "130107241+oxyzenQ@users.noreply.github.com"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2

      - name: Install codespell
        run: python3 -m pip install --user codespell

      - name: Refresh Cargo dependencies
        run: cargo update

      - name: Run checks
        run: ./check.sh

      - name: Commit dependency refresh
        run: |
          set -Eeuo pipefail
          git add Cargo.lock
          if git diff --cached --quiet; then
            echo "Dependencies are already up to date"
            exit 0
          fi
          git commit -m "chore: weekly dependency refresh"

      - name: Push default branch update
        run: |
          set -Eeuo pipefail
          if git diff --quiet HEAD origin/"${DEFAULT_BRANCH}"; then
            echo "No dependency refresh commit to push"
            exit 0
          fi
          git push origin "HEAD:${DEFAULT_BRANCH}"

name: zejtron - AUR Sync

on:
  repository_dispatch:
    types:
      - aur-sync
  workflow_dispatch:

permissions:
  contents: read

env:
  AUR_REPO: ssh://aur@aur.archlinux.org/zejtron-bin.git
  AUR_BRANCH: master
  PKGBUILD_DIR: aur/zejtron-bin

jobs:
  sync:
    name: Sync zejtron-bin
    runs-on: ubuntu-latest

    steps:
      - name: Resolve source ref
        id: source
        shell: bash
        env:
          DISPATCH_TAG: ${{ github.event.client_payload.tag }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          AUR_SSH_PRIVATE_KEY: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
        run: |
          set -Eeuo pipefail
          echo "event name: ${GITHUB_EVENT_NAME}"
          if [[ -n "${AUR_SSH_PRIVATE_KEY}" ]]; then
            echo "AUR_SSH_PRIVATE_KEY present: yes"
          else
            echo "AUR_SSH_PRIVATE_KEY present: no"
          fi

          if [[ "${GITHUB_EVENT_NAME}" == "repository_dispatch" ]]; then
            tag="${DISPATCH_TAG}"
            if [[ "$tag" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
              tag="v${tag}"
            fi
            if [[ ! "$tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
              echo "invalid release tag: ${DISPATCH_TAG}" >&2
              exit 1
            fi
            echo "source ref: ${tag}"
            echo "source label: ${tag}"
            {
              echo "ref=${tag}"
              echo "label=${tag}"
              echo "expected_pkgver=${tag#v}"
            } >> "$GITHUB_OUTPUT"
            exit 0
          fi

          branch="${DEFAULT_BRANCH:-main}"
          if [[ "$branch" != "main" ]]; then
            echo "manual AUR sync must read metadata from main; default branch is ${branch}" >&2
            exit 1
          fi
          echo "source ref: main"
          echo "source label: main"
          {
            echo "ref=main"
            echo "label=main"
            echo "expected_pkgver="
          } >> "$GITHUB_OUTPUT"

      - name: Checkout package metadata source
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.source.outputs.ref }}

      - name: Validate package metadata
        shell: bash
        env:
          EXPECTED_PKGVER: ${{ steps.source.outputs.expected_pkgver }}
        run: |
          set -Eeuo pipefail
          test -f "${PKGBUILD_DIR}/PKGBUILD"
          test -f "${PKGBUILD_DIR}/.SRCINFO"

          grep -n -E '^(pkgver=|pkgdesc=)|^[[:space:]]*(pkgver|pkgdesc) = ' \
            "${PKGBUILD_DIR}/PKGBUILD" "${PKGBUILD_DIR}/.SRCINFO"

          pkgbuild_pkgver="$(sed -n -E 's/^pkgver=([^[:space:]]+).*/\1/p' "${PKGBUILD_DIR}/PKGBUILD" | head -n1)"
          pkgbuild_pkgdesc="$(sed -n -E 's/^pkgdesc="(.*)"/\1/p' "${PKGBUILD_DIR}/PKGBUILD" | head -n1)"
          srcinfo_pkgver="$(sed -n -E 's/^[[:space:]]*pkgver = (.*)/\1/p' "${PKGBUILD_DIR}/.SRCINFO" | head -n1)"
          srcinfo_pkgdesc="$(sed -n -E 's/^[[:space:]]*pkgdesc = (.*)/\1/p' "${PKGBUILD_DIR}/.SRCINFO" | head -n1)"

          if [[ -z "$pkgbuild_pkgver" || -z "$srcinfo_pkgver" ]]; then
            echo "pkgver missing from PKGBUILD or .SRCINFO" >&2
            exit 1
          fi
          if [[ -z "$pkgbuild_pkgdesc" || -z "$srcinfo_pkgdesc" ]]; then
            echo "pkgdesc missing from PKGBUILD or .SRCINFO" >&2
            exit 1
          fi
          if [[ "$pkgbuild_pkgver" != "$srcinfo_pkgver" ]]; then
            echo "pkgver mismatch: PKGBUILD=${pkgbuild_pkgver} .SRCINFO=${srcinfo_pkgver}" >&2
            exit 1
          fi
          if [[ -n "$EXPECTED_PKGVER" && "$pkgbuild_pkgver" != "$EXPECTED_PKGVER" ]]; then
            echo "release tag/pkgver mismatch: tag=${EXPECTED_PKGVER} PKGBUILD=${pkgbuild_pkgver}" >&2
            exit 1
          fi
          if [[ "$pkgbuild_pkgdesc" != "$srcinfo_pkgdesc" ]]; then
            echo "pkgdesc mismatch: PKGBUILD=${pkgbuild_pkgdesc} .SRCINFO=${srcinfo_pkgdesc}" >&2
            exit 1
          fi

      - name: Setup SSH
        shell: bash
        env:
          AUR_SSH_PRIVATE_KEY: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
        run: |
          set -Eeuo pipefail
          if [[ -z "${AUR_SSH_PRIVATE_KEY}" ]]; then
            echo "AUR_SSH_PRIVATE_KEY secret is required" >&2
            exit 1
          fi

          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$AUR_SSH_PRIVATE_KEY" > ~/.ssh/aur
          chmod 600 ~/.ssh/aur

          keyscan="$(ssh-keyscan -t ed25519 aur.archlinux.org 2>/dev/null)"
          if [[ -z "$keyscan" ]]; then
            echo "failed to scan AUR SSH host key" >&2
            exit 1
          fi
          fingerprint="$(printf '%s\n' "$keyscan" | ssh-keygen -lf - | awk '{print $2}')"
          expected="SHA256:RFzBCUItH9LZS0cKB5UE6ceAYhBD5C8GeOBip8Z11+4"
          if [[ "$fingerprint" != "$expected" ]]; then
            echo "AUR SSH host fingerprint mismatch" >&2
            echo "expected: $expected" >&2
            echo "actual:   $fingerprint" >&2
            exit 1
          fi
          printf '%s\n' "$keyscan" > ~/.ssh/known_hosts
          cat > ~/.ssh/config <<'EOF'
          Host aur.archlinux.org
            User aur
            IdentityFile ~/.ssh/aur
            IdentitiesOnly yes
            StrictHostKeyChecking yes
          EOF
          chmod 600 ~/.ssh/config ~/.ssh/known_hosts

      - name: Clone AUR repository
        shell: bash
        run: |
          set -Eeuo pipefail
          set +e
          clone_output="$(git clone --branch "${AUR_BRANCH}" "${AUR_REPO}" aur-repo 2>&1)"
          clone_status=$?
          set -e

          if [[ "$clone_status" -eq 0 ]]; then
            exit 0
          fi

          printf '%s\n' "$clone_output"

          if grep -Eqi 'permission denied|publickey|authentication|host key|identification has changed' <<<"$clone_output"; then
            echo "failed to authenticate or verify AUR SSH host" >&2
            exit "$clone_status"
          fi

          if grep -Eqi 'not found|does not appear to be a git repository|could not read from remote repository|remote branch .* not found|empty repository' <<<"$clone_output"; then
            echo "AUR repository appears empty or not initialized; bootstrapping local repository"
            mkdir aur-repo
            cd aur-repo
            git init
            git checkout -B "${AUR_BRANCH}"
            git remote add origin "${AUR_REPO}"
            exit 0
          fi

          echo "failed to clone AUR repository" >&2
          exit "$clone_status"

      - name: Copy package files
        run: |
          cp "${PKGBUILD_DIR}/PKGBUILD" aur-repo/PKGBUILD
          cp "${PKGBUILD_DIR}/.SRCINFO" aur-repo/.SRCINFO

      - name: Commit AUR update
        working-directory: aur-repo
        shell: bash
        run: |
          set -Eeuo pipefail
          git config user.name "rezky_nightky"
          git config user.email "rezky2399@proton.me"
          git add PKGBUILD .SRCINFO
          if git diff --cached --quiet; then
            echo "AUR package is already up to date"
            exit 0
          fi
          git commit -m "Sync zejtron-bin metadata from ${{ steps.source.outputs.label }}"

      - name: Push AUR update
        working-directory: aur-repo
        shell: bash
        run: |
          set -Eeuo pipefail
          for attempt in 1 2 3; do
            if git push origin "${AUR_BRANCH}"; then
              exit 0
            fi
            sleep $((attempt * 5))
            git pull --rebase origin "${AUR_BRANCH}"
          done
          git push origin "${AUR_BRANCH}"

      - name: Cleanup SSH key
        if: always()
        run: rm -f ~/.ssh/aur

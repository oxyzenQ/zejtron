name: nestkit - AUR Sync

on:
  repository_dispatch:
    types:
      - aur-sync
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to sync, such as v0.1.0 or 0.1.0
        required: true
        type: string

permissions:
  contents: read

env:
  AUR_REPO: ssh://aur@aur.archlinux.org/nestkit-bin.git
  AUR_BRANCH: master
  PKGBUILD_DIR: aur/nestkit-bin

jobs:
  aur:
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest

    steps:
      - name: Install tools
        run: |
          pacman -Sy --noconfirm --needed base-devel git openssh

      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare makepkg user
        shell: bash
        run: |
          set -Eeuo pipefail
          useradd -m aurbuild
          chown -R aurbuild:aurbuild "$GITHUB_WORKSPACE"

      - name: Debug dispatch context
        shell: bash
        env:
          AUR_SSH_PRIVATE_KEY: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
          RAW_TAG: ${{ github.event.client_payload.tag || inputs.tag }}
        run: |
          set -Eeuo pipefail
          echo "event name: ${GITHUB_EVENT_NAME}"
          echo "raw tag: ${RAW_TAG}"
          if [[ -n "${AUR_SSH_PRIVATE_KEY}" ]]; then
            echo "AUR_SSH_PRIVATE_KEY present: yes"
          else
            echo "AUR_SSH_PRIVATE_KEY present: no"
          fi

      - name: Normalize tag
        id: tag
        shell: bash
        env:
          RAW_TAG: ${{ github.event.client_payload.tag || inputs.tag }}
        run: |
          set -Eeuo pipefail
          raw="${RAW_TAG}"
          if [[ "$raw" =~ ^v?([0-9]+)\.([0-9]+)\.([0-9]+)$ ]]; then
            version="${BASH_REMATCH[1]}.${BASH_REMATCH[2]}.${BASH_REMATCH[3]}"
            tag="v${version}"
          else
            echo "error: tag must be vX.Y.Z or X.Y.Z" >&2
            exit 1
          fi
          echo "resolved tag: ${tag}"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"

      - name: Update package metadata
        shell: bash
        run: |
          set -Eeuo pipefail
          version="${{ steps.tag.outputs.version }}"
          package_dir="${GITHUB_WORKSPACE}/${PKGBUILD_DIR}"
          runuser -u aurbuild -- env PACKAGE_DIR="$package_dir" VERSION="$version" bash <<'EOF'
            set -Eeuo pipefail
            cd "$PACKAGE_DIR"
            sed -i -E "s/^pkgver=.*/pkgver=${VERSION}/" PKGBUILD
            sed -i -E "s/^pkgrel=.*/pkgrel=1/" PKGBUILD
            makepkg --printsrcinfo > .SRCINFO
            grep -q "^pkgver=${VERSION}$" PKGBUILD
            grep -q "pkgver = ${VERSION}" .SRCINFO
          EOF

      - name: Configure SSH
        shell: bash
        env:
          AUR_SSH_PRIVATE_KEY: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
        run: |
          set -Eeuo pipefail
          if [[ -z "${AUR_SSH_PRIVATE_KEY}" ]]; then
            echo "error: AUR_SSH_PRIVATE_KEY secret is required" >&2
            exit 1
          fi

          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "${AUR_SSH_PRIVATE_KEY}" > ~/.ssh/aur
          chmod 600 ~/.ssh/aur

          known_hosts="${HOME}/.ssh/known_hosts"
          host_key="$(ssh-keyscan -t ed25519 aur.archlinux.org 2>/dev/null)"
          fingerprint="$(printf '%s\n' "${host_key}" | ssh-keygen -lf - -E sha256 | awk '{print $2}')"
          if [[ "$fingerprint" != "SHA256:RFzBCUItH9LZS0cKB5UE6ceAYhBD5C8GeOBip8Z11+4" ]]; then
            echo "error: unexpected aur.archlinux.org SSH fingerprint: ${fingerprint}" >&2
            exit 1
          fi
          printf '%s\n' "${host_key}" > "${known_hosts}"
          chmod 600 "${known_hosts}"

          {
            echo "Host aur.archlinux.org"
            echo "  IdentityFile ~/.ssh/aur"
            echo "  IdentitiesOnly yes"
            echo "  StrictHostKeyChecking yes"
            echo "  UserKnownHostsFile ${known_hosts}"
          } > ~/.ssh/config
          chmod 600 ~/.ssh/config

          echo "GIT_SSH_COMMAND=ssh -i ${HOME}/.ssh/aur -o IdentitiesOnly=yes -o StrictHostKeyChecking=yes -o UserKnownHostsFile=${known_hosts}" >> "$GITHUB_ENV"
          echo "Configured AUR SSH using verified Ed25519 host key: ${fingerprint}"

      - name: Publish to AUR
        shell: bash
        run: |
          set -Eeuo pipefail
          workdir="$(mktemp -d)"
          pkgbuild_src="${GITHUB_WORKSPACE}/${PKGBUILD_DIR}"

          ls_remote_log="${workdir}/ls-remote.log"
          if git ls-remote --exit-code --heads "$AUR_REPO" "$AUR_BRANCH" >/dev/null 2>"${ls_remote_log}"; then
            git clone --branch "$AUR_BRANCH" "$AUR_REPO" "$workdir/nestkit-bin"
          elif grep -qi "repository .* does not exist" "${ls_remote_log}"; then
            echo "AUR repository does not exist yet; bootstrapping ${AUR_BRANCH}"
            mkdir -p "$workdir/nestkit-bin"
            git -C "$workdir/nestkit-bin" init -b "$AUR_BRANCH"
            git -C "$workdir/nestkit-bin" remote add origin "$AUR_REPO"
          else
            echo "error: failed to inspect AUR repository" >&2
            cat "${ls_remote_log}" >&2
            exit 1
          fi

          cp "$pkgbuild_src/PKGBUILD" "$pkgbuild_src/.SRCINFO" "$workdir/nestkit-bin/"
          git -C "$workdir/nestkit-bin" config user.name "rezky_nightky"
          git -C "$workdir/nestkit-bin" config user.email "rezky2399@proton.me"
          git -C "$workdir/nestkit-bin" add PKGBUILD .SRCINFO

          if git -C "$workdir/nestkit-bin" diff --cached --quiet; then
            echo "AUR metadata already up to date for ${{ steps.tag.outputs.tag }}"
            exit 0
          fi

          git -C "$workdir/nestkit-bin" commit -m "Update to ${{ steps.tag.outputs.tag }}"
          for attempt in 1 2 3; do
            if git -C "$workdir/nestkit-bin" push origin "$AUR_BRANCH"; then
              exit 0
            fi
            sleep "$((attempt * 5))"
          done
          echo "error: failed to push AUR repository after retries" >&2
          exit 1

      - name: Cleanup SSH key
        if: always()
        run: rm -f ~/.ssh/aur

name: zejtron - Docs CI

on:
  push:
    paths:
      - '**/*.md'
      - '**/*.txt'
      - 'LICENSE'
  pull_request:
    paths:
      - '**/*.md'
      - '**/*.txt'
      - 'LICENSE'

permissions:
  contents: read

jobs:
  lint:
    name: Markdown Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install codespell
        run: python3 -m pip install --user codespell

      - name: Check spelling
        run: codespell **/*.md
